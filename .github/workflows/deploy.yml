name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "apps/website/**"
      - "crates/aleph-wasm/**"
      - ".github/workflows/deploy.yml"

concurrency:
  group: deploy
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  deploy:
    name: Build & deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # rustup reads rust-toolchain.toml (channel 1.95.0 + wasm32 target)
      - name: Install pinned Rust toolchain
        run: rustup show

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-opt (binaryen)
        run: sudo apt-get install -y binaryen

      - name: Install wasm-bindgen-cli
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@0.2.118

      - name: Build WASM codec
        run: |
          cargo build -p aleph-wasm --release --target wasm32-unknown-unknown
          wasm-bindgen --target web --out-dir apps/website/src/lib/wasm \
            target/wasm32-unknown-unknown/release/aleph_wasm.wasm
          wasm-opt -Oz --enable-reference-types --enable-bulk-memory \
            -o apps/website/src/lib/wasm/aleph_wasm_bg.wasm \
            apps/website/src/lib/wasm/aleph_wasm_bg.wasm

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: apps/website/pnpm-lock.yaml

      - name: Install website dependencies
        run: cd apps/website && pnpm install --frozen-lockfile

      - name: Build website
        run: cd apps/website && pnpm build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          workingDirectory: apps/website
          command: deploy
